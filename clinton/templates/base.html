<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clintontech</title>
    <!--------------------------------------------- Bootstrap 5 -------------------------------------------------------------->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <!--------------------------------------------- Custom Navbar Styles -------------------------------------------------------->
    <style>
        :root {
            --bg: #121212;
            --surface: #1f1f1f;
            --surface-strong: #262626;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --accent: #25D366;
            --accent-dark: #1ebe5d;
            --shadow-elevated: 0 4px 20px rgba(0, 0, 0, 0.3);
            --radius: 12px;
            --transition: 0.3s ease;
        }

        body {
            background: radial-gradient(900px 500px at 15% 10%, rgba(37, 211, 102, 0.05), transparent 55%),
                        radial-gradient(700px 400px at 85% 0%, rgba(37, 211, 102, 0.04), transparent 55%),
                        linear-gradient(180deg, #121212 0%, #121212 100%);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            line-height: 1.7;
        }

        .page-content {
            position: relative;
            z-index: 1;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            transition: color var(--transition);
        }

        a:hover {
            color: var(--accent-dark);
        }

        .navbar-custom {
            background: var(--surface);
            border-bottom: 1px solid var(--surface-strong);
            box-shadow: var(--shadow-elevated);
        }

        .navbar-brand {
            color: var(--text-primary) !important;
        }

        .nav-custom {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-secondary) !important;
            transition: color var(--transition);
        }

        .nav-custom:hover,
        .nav-custom:focus {
            color: var(--accent) !important;
        }

        .btn-primary {
            background-color: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
            border-radius: 10px;
            transition: background-color var(--transition), transform var(--transition), box-shadow var(--transition);
            box-shadow: 0 6px 16px rgba(37, 211, 102, 0.25);
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background-color: var(--accent-dark);
            border-color: var(--accent-dark);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.35);
        }

        .btn-secondary {
            background-color: var(--surface-strong);
            border-color: var(--surface-strong);
            color: var(--text-primary);
            border-radius: 10px;
            transition: background-color var(--transition), transform var(--transition), box-shadow var(--transition);
        }

        .btn-secondary:hover,
        .btn-secondary:focus {
            background-color: #2f2f2f;
            color: var(--text-primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-elevated);
        }

        .card {
            background-color: var(--surface);
            border: 1px solid var(--surface-strong);
            border-radius: var(--radius);
            box-shadow: var(--shadow-elevated);
            color: var(--text-primary);
        }

        .card .text-muted {
            color: var(--text-muted) !important;
        }

        section {
            background-color: transparent;
            padding: 20px;
        }

        .surface {
            background-color: var(--surface);
            border: 1px solid var(--surface-strong);
            border-radius: var(--radius);
            box-shadow: var(--shadow-elevated);
        }

        .text-secondary {
            color: var(--text-secondary) !important;
        }

        .text-accent {
            color: var(--accent) !important;
        }

        hr {
            border-color: var(--surface-strong);
        }

        footer {
            background-color: #0d0d0d;
            color: var(--text-secondary);
            border-top: 1px solid var(--surface-strong);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--accent);
            color: white;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            text-decoration: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            transition: background-color var(--transition), transform var(--transition);
        }

        .whatsapp-float:hover {
            background-color: var(--accent-dark);
            transform: translateY(-2px);
        }
    </style>
    <!--------------------------------------------------- Navbar ------------------------------------------------------------------------------------->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <!----------------------------------------------- Brand ----------------------------------------------------------------------------------->
        <a class="navbar-brand fw-bold fst-italic" href="{% url 'home' %}" style="font-size: 1.8rem;">
            Clinton Munene
        </a>

        <!----------------------------------------- Toggler for mobile ------------------------------------------------------------------------------->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!------------------------------------------------- Links ------------------------------------------------------------------------------>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link nav-custom" href="{% url 'home' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-custom" href="{% url 'projects' %}">Projects</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-custom" href="{% url 'contact' %}">Contact</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-------------------------------------------------------- Page content ---------------------------------------------------------------------->
    <main class="container my-5 page-content">
        {% block content %}{% endblock %}
    </main>

    <!--------------------------------------------------------- Whatsapp icon ------------------------------------------------->
    <a href="https://wa.me/254700387730" target="_blank" class="whatsapp-float">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!--------------------------------------------------------- Footer ---------------------------------------------------------------------------->
    <footer class="bg-black text-white py-3 mt-auto">
        <div class="container d-flex justify-content-between align-items-center">
            <!----------------------------------------------- Left: Copyright -------------------------------------------------------------->
            <p class="mb-0">&copy; 2025 Clinton Munene. All Rights Reserved.</p>

            <!-------------------------------------------- Right: Social Media Icons -------------------------------------------------------->
            <div class="d-flex gap-3">
                <a href="https://www.linkedin.com/in/clinton-munene?lipi=
                urn%3Ali%3Apage%3Ad_flagship3_profile_view_base_contact_details%3B23y2eVN3Re2omNJl5UO9FQ%3D%3D"
                   target="_blank" class="text-white">
                    <i class="bi bi-linkedin fs-5"></i>
                </a>
                <!------a href="https://instagram.com" target="_blank" class="text-white">
                    <i class="bi bi-instagram fs-5"></i>
                </a-------->
                <!------a href="https://tiktok.com" target="_blank" class="text-white">
                    <i class="bi bi-tiktok fs-5"></i>
                </a-------->
                <!------a href="https://twitter.com" target="_blank" class="text-white">
                    <i class="bi bi-twitter fs-5"></i>
                </a------->
                <!------a href="https://facebook.com" target="_blank" class="text-white">
                    <i class="bi bi-facebook fs-5"></i>
                </a------->
                <a href="https://github.com/Clinton-Analyst" target="_blank" class="text-white">
                    <i class="bi bi-github fs-5"></i>
                </a>
            </div>
        </div>
    </footer>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
